<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Package — Lucas & Liam Legacy Studios</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#0a0e14;--ink2:#141a24;--ink3:#1c2535;--salt:#f0ebe0;--salt2:#d8d0c0;--salt3:#a09888;--steel:#4a6070;--tide:#2a8a7a;--tide2:#1a6a5c;--gold:#c8973a;}
html,body{min-height:100vh;background:var(--ink);color:var(--salt);font-family:'Barlow',sans-serif;font-weight:300;}
.shell{min-height:100vh;display:flex;flex-direction:column;}
.hdr{padding:18px 36px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(240,235,224,0.07);background:rgba(10,14,20,0.98);position:sticky;top:0;z-index:50;}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--salt);}
.hdr-logo span{color:var(--gold);}
.hdr-sub{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--steel);}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;padding:36px 20px 60px;background:radial-gradient(ellipse at 20% 0%,rgba(42,138,122,0.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(200,151,58,0.04) 0%,transparent 50%);}
.prog-wrap{width:100%;max-width:660px;margin-bottom:28px;}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px;}
.prog-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--steel);}
.prog-pct{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);}
.prog-bar{width:100%;height:2px;background:rgba(240,235,224,0.08);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--tide),var(--gold));border-radius:2px;transition:width .6s ease;}
.card{width:100%;max-width:660px;background:var(--ink2);border:1px solid rgba(240,235,224,0.08);border-radius:4px;overflow:hidden;animation:ci .4s ease both;}
@keyframes ci{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.card-hdr{padding:28px 32px 24px;border-bottom:1px solid rgba(240,235,224,0.06);}
.card-step{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:block;}
.card-q{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,4vw,32px);font-weight:300;line-height:1.2;color:var(--salt);}
.card-q em{font-style:italic;color:var(--tide);}
.card-sub{font-size:13px;color:var(--salt3);margin-top:8px;line-height:1.6;}
.card-body{padding:24px 32px;}
.card-ftr{padding:0 32px 24px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:flex-start;gap:16px;padding:16px 18px;background:var(--ink3);border:1px solid rgba(240,235,224,0.07);border-radius:3px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;text-align:left;width:100%;}
.opt:hover{border-color:rgba(42,138,122,0.4);background:rgba(42,138,122,0.06);transform:translateX(3px);}
.opt.sel{border-color:var(--tide);background:rgba(42,138,122,0.1);}
.opt-icon{width:36px;height:36px;border-radius:50%;background:rgba(240,235,224,0.05);border:1px solid rgba(240,235,224,0.1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px;transition:background .2s,border-color .2s;}
.opt:hover .opt-icon,.opt.sel .opt-icon{background:rgba(42,138,122,0.15);border-color:var(--tide);}
.opt-body{flex:1;}
.opt-label{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;color:var(--salt);text-transform:uppercase;}
.opt-desc{font-size:12px;color:var(--salt3);margin-top:3px;line-height:1.5;}
.opt-price{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--gold);margin-top:5px;}
.opt-arrow{font-size:16px;color:var(--tide);opacity:0;transition:opacity .2s;flex-shrink:0;align-self:center;}
.opt:hover .opt-arrow,.opt.sel .opt-arrow{opacity:1;}
.tinput-wrap{display:flex;flex-direction:column;gap:12px;}
.tinput{width:100%;padding:13px 16px;background:var(--ink3);border:1px solid rgba(240,235,224,0.1);border-radius:3px;font-family:'Barlow',sans-serif;font-size:15px;color:var(--salt);outline:none;transition:border-color .25s;}
.tinput:focus{border-color:var(--tide);}
.tinput::placeholder{color:var(--steel);}
.btn-back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--steel);background:none;border:none;cursor:pointer;transition:color .2s;padding:0;}
.btn-back:hover{color:var(--salt2);}
.btn-next{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:var(--tide);color:var(--salt);border:none;padding:12px 32px;border-radius:2px;cursor:pointer;transition:background .2s,transform .15s;}
.btn-next:hover{background:var(--tide2);transform:translateY(-1px);}
.btn-next:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.thinking{display:flex;align-items:center;gap:10px;padding:18px 32px;border-top:1px solid rgba(240,235,224,0.06);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--tide);animation:dp 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
.think-txt{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--steel);}
.result{width:100%;max-width:660px;background:var(--ink2);border:1px solid rgba(240,235,224,0.08);border-radius:4px;overflow:hidden;animation:ci .5s ease both;}
.res-hero{padding:36px 32px;position:relative;overflow:hidden;}
.res-hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 30px,rgba(255,255,255,.015) 30px,rgba(255,255,255,.015) 31px);}
.res-hero.tourism{background:linear-gradient(135deg,var(--tide2) 0%,rgba(10,14,20,1) 100%);}
.res-hero.heritage{background:linear-gradient(135deg,#2a4060 0%,rgba(10,14,20,1) 100%);}
.res-hero.explore{background:linear-gradient(135deg,#3a2a10 0%,rgba(10,14,20,1) 100%);}
.res-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,.3);border:1px solid rgba(240,235,224,.15);border-radius:20px;padding:5px 14px;margin-bottom:16px;position:relative;z-index:1;}
.res-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);}
.res-badge-txt{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.res-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,4vw,36px);font-weight:300;line-height:1.1;color:var(--salt);position:relative;z-index:1;}
.res-title em{font-style:italic;color:var(--gold);}
.res-sum{font-size:13px;color:rgba(240,235,224,.75);margin-top:12px;line-height:1.7;position:relative;z-index:1;}
.res-body{padding:28px 32px;}
.res-sec{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.res-sec::after{content:'';flex:1;height:1px;background:rgba(200,151,58,.2);}
.pkg{background:var(--ink3);border:1px solid rgba(240,235,224,.07);border-radius:3px;padding:24px;margin-bottom:22px;position:relative;overflow:hidden;}
.pkg::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--tide);}
.pkg-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--salt);margin-bottom:4px;}
.pkg-price{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--gold);line-height:1;margin-bottom:2px;}
.pkg-price-note{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--steel);text-transform:uppercase;margin-bottom:16px;}
.pkg-items{list-style:none;display:flex;flex-direction:column;gap:8px;}
.pkg-items li{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--salt2);line-height:1.5;}
.chk{color:var(--tide);flex-shrink:0;}
.pkg-add{margin-top:16px;padding-top:16px;border-top:1px solid rgba(240,235,224,.06);}
.pkg-add-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--steel);margin-bottom:8px;}
.pkg-add-item{font-size:12px;color:var(--salt3);margin-bottom:4px;padding-left:14px;position:relative;}
.pkg-add-item::before{content:'+';position:absolute;left:0;color:var(--gold);}
.trust{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
.trust-item{background:var(--ink3);border:1px solid rgba(240,235,224,.06);border-radius:3px;padding:14px;text-align:center;}
.trust-icon{font-size:18px;margin-bottom:5px;}
.trust-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--steel);}
.trust-val{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--salt);margin-top:2px;}
.next-steps{display:flex;flex-direction:column;gap:9px;margin-bottom:22px;}
.step{display:flex;gap:13px;align-items:flex-start;padding:13px 16px;background:var(--ink3);border:1px solid rgba(240,235,224,.06);border-radius:3px;}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--tide);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--salt);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-t{font-size:13px;color:var(--salt2);line-height:1.6;}
.step-t strong{color:var(--salt);font-weight:500;}
.cta-group{display:flex;flex-direction:column;gap:10px;}
.cta-btn{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-radius:3px;text-decoration:none;cursor:pointer;border:none;transition:transform .2s;width:100%;}
.cta-btn:hover{transform:translateY(-2px);}
.cta-p{background:var(--tide);color:var(--salt);}
.cta-s{background:transparent;border:1px solid rgba(240,235,224,.15);color:var(--salt2);}
.cta-g{background:rgba(200,151,58,.1);border:1px solid rgba(200,151,58,.25);color:var(--gold);}
.cta-lbl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.cta-desc{font-size:11px;opacity:.7;margin-top:2px;}
.cta-arr{font-size:18px;opacity:.7;}
.restart-wrap{padding:18px 32px;border-top:1px solid rgba(240,235,224,.06);text-align:center;}
.restart-btn{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--steel);background:none;border:none;cursor:pointer;transition:color .2s;}
.restart-btn:hover{color:var(--salt2);}
.hidden{display:none!important;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
@media(max-width:600px){
  .hdr{padding:14px 18px;}.hdr-sub{display:none;}
  .card-hdr,.card-body,.card-ftr,.res-body,.res-hero,.restart-wrap{padding-left:18px;padding-right:18px;}
  .trust{grid-template-columns:1fr 1fr;}.trust-item:last-child{display:none;}
}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-logo">Lucas <span>&</span> Liam Legacy Studios</div>
    <div class="hdr-sub">Cape Breton · Atlantic Storytelling</div>
  </div>
  <div class="stage">
    <div class="prog-wrap" id="pw">
      <div class="prog-meta"><span class="prog-label" id="pl">Getting started</span><span class="prog-pct" id="pp">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    </div>
    <div class="card" id="qc">
      <div class="card-hdr"><span class="card-step" id="cs">Step 1</span><div class="card-q" id="cq"></div><div class="card-sub" id="csub"></div></div>
      <div class="card-body" id="cb"></div>
      <div class="thinking hidden" id="think"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span class="think-txt">Building your custom recommendation...</span></div>
      <div class="card-ftr" id="cf"><button class="btn-back hidden" id="bb" onclick="bk()">← Back</button><button class="btn-next" id="bn" onclick="nx()" disabled>Continue →</button></div>
    </div>
    <div class="result hidden" id="rc"></div>
  </div>
</div>
<script>
const S={path:null,ans:{},idx:0,hist:[]};
const QI={id:'intro',step:'Welcome',q:'What brings you to <em>Lucas & Liam Legacy Studios?</em>',sub:'We\'ll match you with the right package in under 2 minutes.',type:'opts',opts:[
  {icon:'🎬',label:'Tourism Business',desc:'B&B, hotel, charter, farm, glamping or tourism experience in Nova Scotia',val:'tourism'},
  {icon:'🏛',label:'Heritage / Conservation',desc:'Museum, heritage society, conservation org or First Nations community',val:'heritage'},
  {icon:'📡',label:'Broadcaster / Grant Body',desc:'CMF, FACTOR, ACOA, Telile, CBC or provincial broadcaster',val:'broadcast'},
  {icon:'🦞',label:'Just exploring',desc:'I want to understand what Lucas & Liam does before committing',val:'explore'},
]};
const TQ=[
  {id:'bt',step:'Your Business',q:'What type of tourism business do you operate?',type:'opts',opts:[
    {icon:'🏡',label:'Accommodation',desc:'Hotel, inn, B&B, cottage, glamping, Airbnb',val:'acc'},
    {icon:'⚓',label:'Charter / Tour',desc:'Fishing charter, boat tour, whale watching, guide',val:'charter'},
    {icon:'🌾',label:'Farm / Artisan Food',desc:'Farm stay, agri-tourism, seafood, market vendor',val:'farm'},
    {icon:'🌲',label:'Outdoor / Adventure',desc:'Eco-tourism, kayak, surf, hiking, trail operator',val:'outdoor'},
    {icon:'🍷',label:'Winery / Brewery',desc:'Craft beverage, agri-tourism experience',val:'craft'},
  ]},
  {id:'ws',step:'Current Presence',q:'What does your online presence look like right now?',sub:'Be honest — it helps us scope the right package.',type:'opts',opts:[
    {icon:'❌',label:'Nothing at all',desc:'No website, just word of mouth',val:'none'},
    {icon:'📘',label:'Facebook / Instagram only',desc:'Social media active but no website',val:'social'},
    {icon:'🔗',label:'Basic or outdated website',desc:'Site exists but no video, no booking, looks dated',val:'basic'},
    {icon:'✅',label:'Decent site, no video',desc:'Good website but zero cinematic content',val:'novid'},
  ]},
  {id:'pain',step:'Your Challenge',q:'What\'s your biggest problem right now?',sub:'Pick the one that costs you the most.',type:'opts',opts:[
    {icon:'👻',label:'Invisible on Google',desc:'Visitors can\'t find me in search results',val:'invisible'},
    {icon:'💸',label:'Losing bookings to platforms',desc:'Airbnb / Booking.com taking 15–25% commission',val:'commission'},
    {icon:'📸',label:'Content doesn\'t do us justice',desc:'My photos and videos don\'t reflect the actual experience',val:'content'},
    {icon:'📅',label:'No way to book directly',desc:'Leads fall through — no online booking system',val:'booking'},
  ]},
  {id:'pkg',step:'Your Package',q:'Which option fits what you need?',sub:'Every package is built around a cinematic film as the foundation.',type:'opts',opts:[
    {icon:'🌟',label:'Film + Website',desc:'Full cinematic brand film plus a new website built around it',val:'full',price:'From $3,500'},
    {icon:'🎬',label:'Film Only',desc:'I have a website — I need the cinematic film and social clips',val:'film',price:'From $1,800'},
    {icon:'🏆',label:'Premium — Everything',desc:'Film, website, SEO, Google Business, full digital setup',val:'premium',price:'From $4,500'},
  ]},
  {id:'time',step:'Timeline',q:'When do you need this completed?',type:'opts',opts:[
    {icon:'⚡',label:'Before summer 2026',desc:'Tourism season is coming — I need this ready',val:'urgent'},
    {icon:'📅',label:'1–3 months',desc:'Quality matters, reasonable timeline',val:'soon'},
    {icon:'🗓',label:'3–6 months',desc:'Planning ahead for the year',val:'later'},
  ]},
  {id:'tc',step:'Almost Done',q:'Who should we follow up with?',sub:'Lucas will reach out personally — no spam, no middleman.',type:'text',fields:[
    {ph:'Your name',key:'name'},{ph:'Business name',key:'biz'},{ph:'Best phone or email',key:'contact'},
  ]},
];
const HQ=[
  {id:'ot',step:'Your Organization',q:'What type of organization are you?',type:'opts',opts:[
    {icon:'🏛',label:'Heritage Society / Museum',desc:'Historical society, museum, archive, cultural centre',val:'museum'},
    {icon:'🌿',label:'Conservation / Environment',desc:'Salmon association, watershed group, DFO partner',val:'conservation'},
    {icon:'🪶',label:'First Nations / Indigenous',desc:'Band council, cultural org, language preservation',val:'indigenous'},
    {icon:'🏘',label:'Community Organization',desc:'Lions Club, community club, volunteer association',val:'community'},
  ]},
  {id:'dt',step:'Your Story',q:'What kind of story needs to be told?',type:'opts',opts:[
    {icon:'📜',label:'Local Heritage Documentary',desc:'Place-based history, characters, events, community memory',val:'place'},
    {icon:'🐟',label:'Conservation Documentary',desc:'Species, watershed, fishery, environmental stewardship',val:'conservation'},
    {icon:'🎵',label:'Cultural Preservation',desc:'Music, language, tradition, ceremony, oral history',val:'cultural'},
    {icon:'🏗',label:'Institutional Story',desc:'Your organization\'s history, impact, and mission',val:'institutional'},
  ]},
  {id:'grant',step:'Funding',q:'Are you exploring grant funding for this project?',sub:'Lucas has experience with ACOA, Building Communities Through Arts & Heritage, and NS Film.',type:'opts',opts:[
    {icon:'✅',label:'Yes — actively applying',desc:'We have a grant or are applying now',val:'yes'},
    {icon:'🔍',label:'Interested — need guidance',desc:'Not sure what\'s available — want help navigating',val:'guidance'},
    {icon:'💳',label:'Self-funded',desc:'We have budget — no grant needed',val:'self'},
  ]},
  {id:'hc',step:'Almost Done',q:'Who should we follow up with?',sub:'Lucas will reach out personally within 24 hours.',type:'text',fields:[
    {ph:'Your name',key:'name'},{ph:'Organization name',key:'biz'},{ph:'Best phone or email',key:'contact'},
  ]},
];
const BQ=[
  {id:'bc',step:'Your Organization',q:'What type of organization do you represent?',type:'opts',opts:[
    {icon:'📺',label:'Broadcaster',desc:'Telile, CBC, regional or national TV',val:'broadcaster'},
    {icon:'🎬',label:'Film Fund / CMF',desc:'Canada Media Fund or provincial film agency',val:'cmf'},
    {icon:'🎵',label:'FACTOR / Music Fund',desc:'Canada Music Fund, FACTOR, music video',val:'factor'},
    {icon:'🏛',label:'Heritage / ACOA Program',desc:'Building Communities, ACOA, NS Film & Creative Industries',val:'heritage'},
  ]},
  {id:'bi',step:'Content Interest',q:'What type of content are you looking to commission?',type:'opts',opts:[
    {icon:'🎭',label:'Documentary Series',desc:'Multi-episode heritage or place-based documentary',val:'docu'},
    {icon:'🐟',label:'ACU Animated Content',desc:'Cod B\'y, Puffy — Atlantic Cinematic Universe characters',val:'acu'},
    {icon:'🎵',label:'Music / Audio-Visual',desc:'Rogue Tide — original Atlantic Canadian music and sync',val:'music'},
    {icon:'📱',label:'Short Form Content',desc:'Heritage reels, documentary clips, social series',val:'short'},
  ]},
  {id:'bcon',step:'Almost Done',q:'How should Lucas reach you?',sub:'Direct response within 24 hours.',type:'text',fields:[
    {ph:'Your name',key:'name'},{ph:'Organization',key:'biz'},{ph:'Best email or phone',key:'contact'},
  ]},
];
const EQ=[{id:'ei',step:'Your Interest',q:'What are you most curious about?',type:'opts',opts:[
  {icon:'🎬',label:'The films we make',desc:'Documentary and brand film work',val:'films'},
  {icon:'🌊',label:'Cape Breton storytelling',desc:'Atlantic heritage, Mi\'kmaq culture, place-based stories',val:'heritage'},
  {icon:'🐟',label:'Atlantic Cinematic Universe',desc:'Cod B\'y, Puffy and the ACU world',val:'acu'},
  {icon:'🎵',label:'Rogue Tide music',desc:'Lucas\'s Atlantic folk-rock project',val:'music'},
]}];

function getQs(){if(!S.path)return[QI];if(S.path==='tourism')return[QI,...TQ];if(S.path==='heritage')return[QI,...HQ];if(S.path==='broadcast')return[QI,...BQ];return[QI,...EQ];}

function render(i){
  const qs=getQs(),q=qs[i],tot=qs.length,pct=Math.round(i/tot*100);
  document.getElementById('pl').textContent=q.step||`Step ${i+1}`;
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('cs').textContent=`Step ${i+1} of ${tot}`;
  document.getElementById('cq').innerHTML=q.q;
  document.getElementById('csub').textContent=q.sub||'';
  const cb=document.getElementById('cb');cb.innerHTML='';
  if(q.type==='opts'){
    const w=document.createElement('div');w.className='opts';
    q.opts.forEach(o=>{
      const b=document.createElement('button');b.className='opt'+(S.ans[q.id]===o.val?' sel':'');
      b.innerHTML=`<div class="opt-icon">${o.icon}</div><div class="opt-body"><div class="opt-label">${o.label}</div>${o.desc?`<div class="opt-desc">${o.desc}</div>`:''} ${o.price?`<div class="opt-price">${o.price}</div>`:''}</div><div class="opt-arrow">→</div>`;

    });

  }
  if(q.type==='text'){
    const w=document.createElement('div');w.className='tinput-wrap';

  }
  document.getElementById('bb').classList.toggle('hidden',i===0);
  const c=document.getElementById('qc');c.style.animation='none';c.offsetHeight;c.style.animation='ci .4s ease both';
}
function chk(q){document.getElementById('bn').disabled=!q.fields.filter(f=>f.key!=='message').every(f=>(S.ans[f.key]||'').trim().length>1);}

  <div class="restart-wrap"><button class="restart-btn" onclick="restart()">↺ Start over — find your package</button></div>`;
}
function restart(){Object.assign(S,{path:null,ans:{},idx:0,hist:[]});document.getElementById('rc').classList.add('hidden');document.getElementById('rc').innerHTML='';document.getElementById('qc').classList.remove('hidden');document.getElementById('pw').classList.remove('hidden');document.getElementById('think').classList.add('hidden');document.getElementById('cf').classList.remove('hidden');render(0);}
