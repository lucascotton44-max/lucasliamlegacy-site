<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Page Not Found | Lucas &amp; Liam Legacy Studios</title>
<style>
  :root {
    --atlantic: #0E2A33;
    --ember: #C25A2C;
    --parchment: #F2EAD8;
    --ink: #11181C;
    --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    background: var(--atlantic);
    color: var(--parchment);
    font-family: var(--sans);
    line-height: 1.5;
  }
  main {
    width: min(100%, 640px);
  }
  .eyebrow {
    color: var(--ember);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0 0 14px;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(34px, 8vw, 56px);
    line-height: 1.05;
    margin: 0 0 18px;
  }
  p {
    color: rgba(242, 234, 216, 0.82);
    margin: 0 0 26px;
    font-size: 18px;
  }
  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 20px;
    background: var(--ember);
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  a:focus-visible {
    outline: 3px solid var(--parchment);
    outline-offset: 4px;
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Lucas &amp; Liam Legacy Studios</p>
  <h1>Page not found.</h1>
  <p>This page is not available.</p>
  <a href="index.html">Return home</a>
</main>
</body>
</html>
